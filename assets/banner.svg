<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-label="PHOSPHENE — the light you see with your eyes closed">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7df2c8" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#7df2c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c87df2" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#c87df2" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="2.2"/></filter>
  </defs>

  <rect width="900" height="220" fill="#050508"/>

  <!-- phosphene blobs: light with your eyes closed -->
  <ellipse cx="250" cy="115" rx="260" ry="120" fill="url(#g1)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="260;300;260" dur="9s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="660" cy="105" rx="240" ry="110" fill="url(#g2)">
    <animate attributeName="opacity" values="1;0.45;1" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="240;280;240" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- faint spectrum baseline -->
  <g fill="#7df2c8" opacity="0.28">
    <rect x="120" y="176" width="6" height="14"><animate attributeName="height" values="14;26;10;14" dur="1.6s" repeatCount="indefinite"/><animate attributeName="y" values="176;164;180;176" dur="1.6s" repeatCount="indefinite"/></rect>
    <rect x="132" y="170" width="6" height="20"><animate attributeName="height" values="20;34;12;20" dur="1.3s" repeatCount="indefinite"/><animate attributeName="y" values="170;156;178;170" dur="1.3s" repeatCount="indefinite"/></rect>
    <rect x="144" y="180" width="6" height="10"><animate attributeName="height" values="10;30;16;10" dur="1.9s" repeatCount="indefinite"/><animate attributeName="y" values="180;160;174;180" dur="1.9s" repeatCount="indefinite"/></rect>
    <rect x="156" y="174" width="6" height="16"><animate attributeName="height" values="16;22;8;16" dur="1.1s" repeatCount="indefinite"/><animate attributeName="y" values="174;168;182;174" dur="1.1s" repeatCount="indefinite"/></rect>
    <rect x="726" y="176" width="6" height="14"><animate attributeName="height" values="14;24;10;14" dur="1.4s" repeatCount="indefinite"/><animate attributeName="y" values="176;166;180;176" dur="1.4s" repeatCount="indefinite"/></rect>
    <rect x="738" y="170" width="6" height="20"><animate attributeName="height" values="20;30;12;20" dur="1.7s" repeatCount="indefinite"/><animate attributeName="y" values="170;160;178;170" dur="1.7s" repeatCount="indefinite"/></rect>
    <rect x="750" y="178" width="6" height="12"><animate attributeName="height" values="12;28;14;12" dur="1.2s" repeatCount="indefinite"/><animate attributeName="y" values="178;162;176;178" dur="1.2s" repeatCount="indefinite"/></rect>
    <rect x="762" y="172" width="6" height="18"><animate attributeName="height" values="18;24;10;18" dur="1.8s" repeatCount="indefinite"/><animate attributeName="y" values="172;166;180;172" dur="1.8s" repeatCount="indefinite"/></rect>
  </g>

  <!-- wordmark: glow layer then crisp layer -->
  <g font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="64" text-anchor="middle" letter-spacing="18">
    <text x="452" y="124" fill="#7df2c8" opacity="0.7" filter="url(#blur)">PHOSPHENE
      <animate attributeName="opacity" values="0.45;0.85;0.45" dur="5s" repeatCount="indefinite"/>
    </text>
    <text x="452" y="124" fill="#e8e6f0">PHOS<tspan fill="#7df2c8">PH</tspan>ENE</text>
  </g>

  <text x="452" y="164" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="13"
        letter-spacing="6" text-anchor="middle" fill="#8886a0">THE LIGHT YOU SEE WITH YOUR EYES CLOSED</text>
</svg>
