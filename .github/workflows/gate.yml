name: ci
on: [push, pull_request]
jobs:
  mechanical-gate:
    # ONLY the five standard tools — this is `npm run gate`. No behavioral checks.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npm run gate

  behavioral-smoke:
    # NOT part of the mechanical gate. A limited, self-correlated development
    # check (see check.mjs header). It is explicitly NOT external verification.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npm run check
