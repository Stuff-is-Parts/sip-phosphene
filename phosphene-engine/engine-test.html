<!doctype html><html><head><meta charset="utf-8"><title>PHOSPHENE</title>
<style>body{margin:0;background:#000;overflow:hidden}canvas{width:100vw;height:100vh;display:block}
#i{position:fixed;top:8px;left:8px;color:#0f0;font:12px monospace;opacity:.7}</style></head>
<body><canvas id="c"></canvas><div id="i">PHOSPHENE — 101-per_frame.milk</div>
<script type="module">
import { parsePhos, toRuntime } from './src/phos.mjs';
import { Engine } from './src/engine.mjs';
import { feedbackWGSL, compositeWGSL } from './src/render-wgsl.mjs';
import { buildStripIndices, buildWarpUVs, meshPositions, VERT_COUNT } from './src/warp-mesh.mjs';

const sceneText = await (await fetch('./scenes/md-101-per_frame.phos')).text();
const scene = toRuntime(parsePhos(sceneText));
const engine = new Engine(scene);

const canvas = document.getElementById('c');
if (!navigator.gpu) { document.getElementById('i').textContent = 'WebGPU not available in this browser'; throw new Error('no webgpu'); }
const adapter = await navigator.gpu.requestAdapter();
const device = await adapter.requestDevice();
const ctx = canvas.getContext('webgpu');
const fmt = navigator.gpu.getPreferredCanvasFormat();
const dpr = devicePixelRatio || 1;
const texUsage = GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.TEXTURE_BINDING;
let texA, texB, texW = 0, texH = 0;
// render targets follow the window (nTexSize -1 auto-exact, plugin.cpp:1851-1852)
// snapped to 16-pixel blocks (:1879-1880); resize recreates them
function rebuildTargets(){
  const w = Math.max(16, Math.ceil(canvas.width/16)*16), h = Math.max(16, Math.ceil(canvas.height/16)*16);
  if (w === texW && h === texH) return;
  texW = w; texH = h;
  if (texA) texA.destroy(); if (texB) texB.destroy();
  texA = device.createTexture({ size:[texW,texH], format:'rgba8unorm', usage:texUsage });
  texB = device.createTexture({ size:[texW,texH], format:'rgba8unorm', usage:texUsage });
}
function resize(){ canvas.width = innerWidth*dpr; canvas.height = innerHeight*dpr; rebuildTargets(); }
resize(); addEventListener('resize', resize);
ctx.configure({ device, format: fmt, alphaMode: 'opaque' });

const mod = device.createShaderModule({ code: feedbackWGSL });
const sampWrap = device.createSampler({ magFilter:'linear', minFilter:'linear', addressModeU:'repeat', addressModeV:'repeat' });
const sampClamp = device.createSampler({ magFilter:'linear', minFilter:'linear', addressModeU:'clamp-to-edge', addressModeV:'clamp-to-edge' });
const ubuf = device.createBuffer({ size:64, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });
const meshIdx = buildStripIndices();
const ibuf = device.createBuffer({ size:meshIdx.byteLength, usage:GPUBufferUsage.INDEX|GPUBufferUsage.COPY_DST });
device.queue.writeBuffer(ibuf, 0, meshIdx);
const posArr = meshPositions();
const posBuf = device.createBuffer({ size:posArr.byteLength, usage:GPUBufferUsage.VERTEX|GPUBufferUsage.COPY_DST });
device.queue.writeBuffer(posBuf, 0, posArr);
const uvArr = new Float32Array(VERT_COUNT*2);
const uvBuf = device.createBuffer({ size:uvArr.byteLength, usage:GPUBufferUsage.VERTEX|GPUBufferUsage.COPY_DST });
const cbuf = device.createBuffer({ size:32, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });

const bgl = device.createBindGroupLayout({ entries:[
  {binding:0,visibility:GPUShaderStage.FRAGMENT,texture:{}},
  {binding:1,visibility:GPUShaderStage.FRAGMENT,sampler:{}},
  {binding:2,visibility:GPUShaderStage.FRAGMENT,buffer:{type:'uniform'}} ]});
const pipe = device.createRenderPipeline({ layout: device.createPipelineLayout({bindGroupLayouts:[bgl]}),
  vertex:{module:mod,entryPoint:'vs',buffers:[
    {arrayStride:8,attributes:[{shaderLocation:0,offset:0,format:'float32x2'}]},
    {arrayStride:8,attributes:[{shaderLocation:1,offset:0,format:'float32x2'}]}]},
  fragment:{module:mod,entryPoint:'fs',targets:[{format:'rgba8unorm'}]},
  primitive:{topology:'triangle-list'} });
// composite pass: copy the offscreen feedback texture to the swapchain
const blitMod = device.createShaderModule({code:compositeWGSL});
const blitPipe = device.createRenderPipeline({layout:'auto',
  vertex:{module:blitMod,entryPoint:'vs'},
  fragment:{module:blitMod,entryPoint:'fs',targets:[{format:fmt}]},
  primitive:{topology:'triangle-list'}});

let last = performance.now();
function frame(now){
  const dt = Math.min(0.05,(now-last)/1000); last = now;
  engine.setViewport(canvas.width, canvas.height, texW, texH); // live dims each frame
  const st = engine.step(dt, {bass:1,mid:1,treb:1});
  const m=st.motion,ib=st.innerBox,ob=st.outerBox;
  const u = new Float32Array([m.decay,ib.size,ib.r,ib.g,ib.b,ib.a,ib.aGate,ob.size,ob.r,ob.g,ob.b,ob.a,ob.aGate,0,0,0]);
  device.queue.writeBuffer(ubuf,0,u);
  buildWarpUVs(m, texW, texH, uvArr); device.queue.writeBuffer(uvBuf, 0, uvArr);
  const samp = (m.wrap > 0.5) ? sampWrap : sampClamp; // texaddr, milkdropfs.cpp:1991
  const bg = device.createBindGroup({layout:bgl,entries:[
    {binding:0,resource:texA.createView()},{binding:1,resource:samp},
    {binding:2,resource:{buffer:ubuf}} ]});
  const enc = device.createCommandEncoder();
  const rp = enc.beginRenderPass({colorAttachments:[{view:texB.createView(),loadOp:'clear',storeOp:'store',clearValue:{r:0,g:0,b:0,a:1}}]});
  rp.setPipeline(pipe); rp.setBindGroup(0,bg); rp.setVertexBuffer(0,posBuf); rp.setVertexBuffer(1,uvBuf); rp.setIndexBuffer(ibuf,'uint16'); rp.drawIndexed(meshIdx.length); rp.end();
  // composite crop per milkdropfs.cpp:4089-4114: aspect = W/(H*invAspectY) (:4101)
  const aspect=canvas.width/(canvas.height*(1/m.aspectY));
  const cx2=(aspect>1?1:1/aspect)*(1+1/canvas.width), cy2=(aspect>1?aspect:1)*(1+1/canvas.height);
  device.queue.writeBuffer(cbuf,0,new Float32Array([st.comp.gamma,st.comp.echoAlpha,st.comp.echoZoom,st.comp.echoOrient,cx2,cy2,0,0]));
  const bbg = device.createBindGroup({layout:blitPipe.getBindGroupLayout(0),entries:[
    {binding:0,resource:texB.createView()},{binding:1,resource:sampWrap},{binding:2,resource:{buffer:cbuf}}]});
  const rp2 = enc.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(),loadOp:'clear',storeOp:'store',clearValue:{r:0,g:0,b:0,a:1}}]});
  rp2.setPipeline(blitPipe); rp2.setBindGroup(0,bbg); rp2.draw(3); rp2.end();
  device.queue.submit([enc.finish()]);
  [texA,texB] = [texB,texA]; // feedback ping-pong
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script></body></html>
