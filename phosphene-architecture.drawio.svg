<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">PHOSPHENE complete first-party functional architecture</title>
  <desc id="desc">Authoritative MilkDrop and Plane9 evidence flows through inventories and strict converters into a native phos document, engine, shared WebGPU executor, player, and studio.</desc>
