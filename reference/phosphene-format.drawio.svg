<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">PHOSPHENE native phos/1 model</title>
  <desc id="desc">A strict scene document with resources, nodes, typed edges, and expression programs is parsed canonically and projected into the Engine without a second scene format.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#ffd700"/></marker><marker id="small" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#cccccc"/></marker></defs>
  <rect width="1200" height="680" fill="#1a1a2e"/>
  <text x="40" y="54" fill="#fff" font-family="Arial,sans-serif" font-size="28" font-weight="700">PHOSPHENE · native .phos/1 model</text>
  <text x="40" y="82" fill="#aaa" font-family="Arial,sans-serif" font-size="18">Zoom-in of main architecture §1D · Native Model</text>
  <g font-family="Arial,sans-serif">
    <g fill="#2a2a40" stroke="#444466" stroke-width="2" stroke-dasharray="7 6"><rect x="40" y="110" width="530" height="490" rx="12"/><rect x="630" y="110" width="530" height="490" rx="12"/></g>
    <g fill="#ccc" font-size="22" font-weight="700" text-anchor="middle"><text x="305" y="145">STRICT DOCUMENT</text><text x="895" y="145">RUNTIME PROJECTION</text></g>
    <path d="M70 190 h470 v80 h-470 z" fill="#3d3d5c" stroke="#666688" stroke-width="2"/><ellipse cx="305" cy="190" rx="235" ry="13" fill="#3d3d5c" stroke="#666688" stroke-width="2"/><ellipse cx="305" cy="270" rx="235" ry="13" fill="#3d3d5c" stroke="#666688" stroke-width="2"/>
    <rect x="70" y="330" width="220" height="105" rx="10" fill="#ffb74d" stroke="#e65100" stroke-width="2"/><rect x="320" y="330" width="220" height="105" rx="10" fill="#3d3d5c" stroke="#666688" stroke-width="2"/><rect x="70" y="470" width="220" height="90" rx="10" fill="#3d3d5c" stroke="#666688" stroke-width="2"/><rect x="320" y="470" width="220" height="90" rx="10" fill="#3d3d5c" stroke="#666688" stroke-width="2"/>
    <rect x="660" y="195" width="470" height="100" rx="4" fill="#ffb74d" stroke="#e65100" stroke-width="2"/><rect x="660" y="335" width="470" height="75" rx="10" fill="#3d3d5c" stroke="#666688" stroke-width="2"/><rect x="660" y="445" width="470" height="100" rx="10" fill="#3d3d5c" stroke="#666688" stroke-width="2"/>
    <g fill="#ddd" font-size="18" text-anchor="middle"><text x="305" y="221" font-size="21">phos/1 root</text><text x="305" y="248">meta · resources · graph · expressions</text><text x="430" y="362">Nodes + local ports</text><text x="430" y="389">primitive · op</text><text x="430" y="416">constants · refs</text><text x="180" y="501">Typed edges</text><text x="180" y="528">node.port → node.port</text><text x="180" y="551">single input driver</text><text x="430" y="501">Expression programs</text><text x="430" y="528">per-frame executable</text><text x="430" y="551">per-vertex refused</text><text x="895" y="366" font-size="21">toRuntime</text><text x="895" y="394">scene data projected without a second format</text><text x="895" y="476" font-size="20">Engine validation + execution</text><text x="895" y="504">resource ownership · complete typed graph</text><text x="895" y="531">value propagation · render-plan construction</text></g>
    <g fill="#333" font-size="17" text-anchor="middle"><text x="180" y="356">Resource descriptors</text><text x="180" y="380">texture · presentation</text><text x="180" y="404">format · size · lifetime</text><text x="180" y="428">usage</text><text x="895" y="226" font-size="20">parsePhos / serializePhos</text><text x="895" y="254">allowlisted keys · canonical order</text><text x="895" y="281">unknown or unsupported data refuses</text></g>
    <g fill="none"><path d="M235 278 V315 H180 V330" stroke="#ccc" stroke-width="3" marker-end="url(#small)"/><path d="M375 278 V315 H430 V330" stroke="#ccc" stroke-width="3" marker-end="url(#small)"/><path d="M180 435 V470" stroke="#ccc" stroke-width="3" marker-end="url(#small)"/><path d="M430 435 V470" stroke="#ccc" stroke-width="3" marker-end="url(#small)"/><path d="M540 230 H610 V245 H660" stroke="#ffd700" stroke-width="6" marker-end="url(#arrow)"/><path d="M895 295 V335" stroke="#ccc" stroke-width="3" marker-end="url(#small)"/><path d="M895 410 V445" stroke="#ccc" stroke-width="3" marker-end="url(#small)"/></g>
    <text x="600" y="220" fill="#fff" font-size="16" text-anchor="middle">strict JSON</text>
  </g>
</svg>
